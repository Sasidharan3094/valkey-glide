[tool.isort]
profile = "black"
skip = [".env", "glide-shared/glide_shared/protobuf", "build"]
known_first_party = ["glide-sync", "glide-async", "glide-shared", "tests"]

[tool.black]
target-version = ['py39', 'py310', 'py311', 'py312']

[tool.mypy]
exclude = "^(.*\\/)?(\\.env|glide-shared/glide_shared/protobuf|utils/release-candidate-testing|target|ort|build)(\\/|$)"

[[tool.mypy.overrides]]
module = "glide_shared._fast_response"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Pre-existing type errors in test utilities (custom_command variance, dict indexing).
# Does not suppress errors in actual test files.
module = "tests.utils.*"
ignore_errors = true
