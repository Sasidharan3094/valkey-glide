name: Java Prepare Deployment

on:
    pull_request:
        paths:
            - .github/workflows/java-cd.yml
            - .github/workflows/install-shared-dependencies/action.yml
            - .github/workflows/install-engine/action.yml
            - .github/json_matrices/**
    push:
        tags:
            - "v*.*"
    workflow_dispatch:
        inputs:
            version:
                description: "The release version of GLIDE, formatted as *.*.* or *.*.*-rc*"
                required: true
            maven_publish:
                description: "Publish to Maven Central"
                required: true
                type: boolean

concurrency:
    group: java-cd-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    id-token: write

jobs:
    load-platform-matrix:
        runs-on: ubuntu-latest
        environment: AWS_ACTIONS
        outputs:
            PLATFORM_MATRIX: ${{ steps.load-platform-matrix.outputs.PLATFORM_MATRIX }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: load-platform-matrix
              id: load-platform-matrix
              shell: bash
              run: |
                  # Filter entries with maven in PACKAGE_MANAGERS and replace "ephemeral" with "persistent" in RUNNER
                  export PLATFORM_MATRIX=$(jq 'map(
                      select(.PACKAGE_MANAGERS != null and (.PACKAGE_MANAGERS | contains(["maven"])))
                      | .RUNNER = (
                          if (.RUNNER | type == "array")
                          then (.RUNNER | map(if . == "ephemeral" then "persistent" else . end))
                          else (if .RUNNER == "ephemeral" then "persistent" else .RUNNER end)
                          end
                      )
                  )' < .github/json_matrices/build-matrix.json | jq -c .)
                  echo "PLATFORM_MATRIX=${PLATFORM_MATRIX}" >> $GITHUB_OUTPUT

    set-release-version:
        runs-on: ubuntu-latest
        outputs:
            RELEASE_VERSION: ${{ steps.release-version.outputs.RELEASE_VERSION }}
        steps:
            - name: Set the release version
              id: release-version
              shell: bash
              run: |
                  if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                      R_VERSION="255.255.255"
                  elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                      R_VERSION="${{ env.INPUT_VERSION }}"
                  else
                      R_VERSION=${GITHUB_REF:11}
                  fi
                  echo "RELEASE_VERSION=${R_VERSION}" >> $GITHUB_ENV
                  echo "Release version detected: $R_VERSION"
                  echo "RELEASE_VERSION=$R_VERSION" >> $GITHUB_OUTPUT
              env:
                  INPUT_VERSION: ${{ github.event.inputs.version }}

    create-binaries-to-publish:
        needs: [set-release-version, load-platform-matrix]
        if: github.repository_owner == 'valkey-io'
        timeout-minutes: 35
        env:
            JAVA_VERSION: "11"
            RELEASE_VERSION: ${{ needs.set-release-version.outputs.RELEASE_VERSION }}
        strategy:
            # Run all jobs
            fail-fast: false
            matrix:
                host: ${{ fromJson(needs.load-platform-matrix.outputs.PLATFORM_MATRIX) }}

        runs-on: ${{ matrix.host.RUNNER }}

        steps:
            - name: Setup self-hosted runner access
              if: runner.os != 'Windows'
              shell: bash
              run: |
                  GHA_HOME=/home/ubuntu/actions-runner/_work/valkey-glide
                  if [ -d $GHA_HOME ]; then
                    sudo chown -R $USER:$USER $GHA_HOME
                    sudo rm -rf $GHA_HOME
                    mkdir -p $GHA_HOME/valkey-glide
                  else
                    echo "No cleaning needed"
                  fi
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Set up JDK
              uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
              with:
                  distribution: "temurin"
                  java-version: ${{ env.JAVA_VERSION }}

            - name: Install shared software dependencies
              uses: ./.github/actions/install-shared-dependencies
              with:
                  os: ${{ matrix.host.OS }}
                  target: ${{ matrix.host.CD_TARGET || matrix.host.TARGET }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  language: java

            - name: Run rustup with correct target
              if: ${{ contains(matrix.host.TARGET, 'musl') }}
              run: |
                  rustup target add ${{ matrix.host.TARGET }}

            - name: Install protoc (protobuf)
              uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
              with:
                  version: "29.1"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Cache Gradle dependencies
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-cd-${{ hashFiles('java/**/*.gradle*', 'java/**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-cd-
                      ${{ runner.os }}-gradle-

            - name: Create secret key ring file for all Java submodules
              working-directory: java/client
              shell: bash
              run: |
                  # Decode the provided base64 GPG key into the client module
                  echo "$SECRING_GPG" | base64 --decode > ./secring.gpg

                  # Copy the key ring file into Jedis compatibility modules that perform signing
                  if [ -d ../jedis-compatibility ]; then
                    cp ./secring.gpg ../jedis-compatibility/secring.gpg
                  else
                    echo "jedis-compatibility module directory not found" >&2
                    exit 1
                  fi
                  if [ -d ../jedis-4-compatibility ]; then
                    cp ./secring.gpg ../jedis-4-compatibility/secring.gpg
                  fi
                  if [ -d ../jedis-compat-shared ]; then
                    cp ./secring.gpg ../jedis-compat-shared/secring.gpg
                  fi

                  echo "Listing key ring files to verify presence:"
                  ls -l ./secring.gpg ../jedis-compatibility/secring.gpg
                  if [ -f ../jedis-4-compatibility/secring.gpg ]; then ls -l ../jedis-4-compatibility/secring.gpg; fi
                  if [ -f ../jedis-compat-shared/secring.gpg ]; then ls -l ../jedis-compat-shared/secring.gpg; fi
              env:
                  SECRING_GPG: ${{ secrets.SECRING_GPG }}

            - name: Build java client
              working-directory: java
              shell: bash
              env:
                  GLIDE_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
              run: |
                  # Determine gradle command based on OS
                  if [[ "${{ matrix.host.OS }}" == "windows" ]]; then
                    GRADLE_CMD="./gradlew.bat"
                  else
                    GRADLE_CMD="./gradlew"
                  fi

                  if [[ "${{ matrix.host.TARGET }}" == *"musl"* ]]; then
                    # Build and publish client first
                    $GRADLE_CMD --build-cache :client:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                    -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }} \
                    -Ptarget=${{ matrix.host.TARGET }} $EXTRA_ARGS

                    # Then build jedis-compat-shared (dependency of jedis compatibility artifacts)
                    $GRADLE_CMD --build-cache :jedis-compat-shared:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                    -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }} \
                    -Ptarget=${{ matrix.host.TARGET }}

                    # Then build jedis-compatibility
                    $GRADLE_CMD --build-cache :jedis-compatibility:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                    -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }} \
                    -Ptarget=${{ matrix.host.TARGET }}

                    # Then build jedis-4-compatibility (when present)
                    if [ -d jedis-4-compatibility ]; then
                      $GRADLE_CMD --build-cache :jedis-4-compatibility:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                      -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }} \
                      -Ptarget=${{ matrix.host.TARGET }}
                    fi
                  else
                    # Build and publish client first
                    $GRADLE_CMD --build-cache :client:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                    -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }} $EXTRA_ARGS

                    # Then build jedis-compat-shared (dependency of jedis compatibility artifacts)
                    $GRADLE_CMD --build-cache :jedis-compat-shared:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                    -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }}

                    # Then build jedis-compatibility
                    $GRADLE_CMD --build-cache :jedis-compatibility:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                    -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }}

                    if [ -d jedis-4-compatibility ]; then
                      $GRADLE_CMD --build-cache :jedis-4-compatibility:publishToMavenLocal -Psigning.secretKeyRingFile=secring.gpg \
                      -Psigning.password="${{ secrets.GPG_PASSWORD }}" -Psigning.keyId=${{ secrets.GPG_KEY_ID }}
                    fi
                  fi

            - name: Bundle JAR
              working-directory: java
              shell: bash
              run: |
                  # Bundle client JAR
                  src_folder=~/.m2/repository/io/valkey/valkey-glide/${{ env.RELEASE_VERSION }}
                  cd $src_folder
                  jar -cvf bundle.jar *
                  ls -ltr
                  cd -
                  cp $src_folder/bundle.jar bundle-${{ matrix.host.TARGET }}.jar

                  # Bundle jedis-compat-shared JAR
                  jedis_shared_folder=~/.m2/repository/io/valkey/valkey-glide-jedis-compat-shared/${{ env.RELEASE_VERSION }}
                  cd $jedis_shared_folder
                  jar -cvf jedis-shared-bundle.jar *
                  ls -ltr
                  cd -
                  cp $jedis_shared_folder/jedis-shared-bundle.jar jedis-shared-bundle-${{ matrix.host.TARGET }}.jar

                  # Bundle jedis-compatibility JAR
                  jedis_src_folder=~/.m2/repository/io/valkey/valkey-glide-jedis-compatibility/${{ env.RELEASE_VERSION }}
                  cd $jedis_src_folder
                  jar -cvf jedis-bundle.jar *
                  ls -ltr
                  cd -
                  cp $jedis_src_folder/jedis-bundle.jar jedis-bundle-${{ matrix.host.TARGET }}.jar

                  # Bundle jedis-4-compatibility JAR (when published)
                  jedis4_src_folder=~/.m2/repository/io/valkey/valkey-glide-jedis-4-compatibility/${{ env.RELEASE_VERSION }}
                  if [ -d "$jedis4_src_folder" ]; then
                    cd $jedis4_src_folder
                    jar -cvf jedis4-bundle.jar *
                    ls -ltr
                    cd -
                    cp $jedis4_src_folder/jedis4-bundle.jar jedis4-bundle-${{ matrix.host.TARGET }}.jar
                  fi
            - name: Smoke test native library
              shell: bash
              run: |
                  find java/client/build/resources/main/natives -name "*.so" -o -name "*.dylib" -o -name "*.dll" | grep -q .

            - name: Upload artifacts to publish
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: java-${{ matrix.host.TARGET }}
                  path: |
                      java/bundle*.jar
                      java/jedis-shared-bundle*.jar
                      java/jedis-bundle*.jar
                      java/jedis4-bundle*.jar

            - name: Upload native library for uber JAR assembly
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: native-lib-${{ matrix.host.TARGET }}
                  path: java/client/build/resources/main/natives/**/*

    create-uber-jar:
        needs: [set-release-version, create-binaries-to-publish]
        if: github.repository_owner == 'valkey-io'
        timeout-minutes: 25
        runs-on: ubuntu-latest
        env:
            JAVA_VERSION: "11"
            RELEASE_VERSION: ${{ needs.set-release-version.outputs.RELEASE_VERSION }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up JDK
              uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
              with:
                  distribution: "temurin"
                  java-version: ${{ env.JAVA_VERSION }}

            - name: Download all native library artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  pattern: native-lib-*
                  path: native-libs-downloaded

            - name: List downloaded artifacts
              run: |
                  echo "Downloaded native library artifacts:"
                  find native-libs-downloaded -type f

            - name: Organize native libraries for uber JAR
              shell: bash
              run: |
                  # Create staging directory for native libraries
                  mkdir -p java/client/build/native-libs-staging/natives

                  # Copy all native libraries from downloaded artifacts
                  # Structure: native-libs-downloaded/native-lib-{TARGET}/{platform}/{arch}/*.{so,dylib,dll}
                  # Target structure: java/client/build/native-libs-staging/natives/{platform}/{arch}/*.{so,dylib,dll}
                  for artifact_dir in native-libs-downloaded/native-lib-*; do
                      if [ -d "$artifact_dir" ]; then
                          echo "Processing $artifact_dir"
                          # Find all native library files and copy them preserving the platform/arch structure
                          find "$artifact_dir" -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) | while read -r lib_file; do
                              # Extract the relative path from the artifact directory
                              rel_path="${lib_file#$artifact_dir/}"
                              target_path="java/client/build/native-libs-staging/natives/$rel_path"
                              # Create target directory if it doesn't exist
                              mkdir -p "$(dirname "$target_path")"
                              # Copy the file
                              cp "$lib_file" "$target_path"
                          done
                      fi
                  done

                  echo "Native libraries staged:"
                  find java/client/build/native-libs-staging -type f

            - name: Install protoc (protobuf)
              uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
              with:
                  version: "29.1"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Cache Gradle dependencies
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-uber-jar-${{ hashFiles('java/**/*.gradle*', 'java/**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-cd-
                      ${{ runner.os }}-gradle-

            - name: Create secret key ring file for all Java submodules
              working-directory: java/client
              shell: bash
              run: |
                  echo "$SECRING_GPG" | base64 --decode > ./secring.gpg
                  if [ -d ../jedis-compatibility ]; then
                    cp ./secring.gpg ../jedis-compatibility/secring.gpg
                  fi
                  if [ -d ../jedis-4-compatibility ]; then
                    cp ./secring.gpg ../jedis-4-compatibility/secring.gpg
                  fi
                  if [ -d ../jedis-compat-shared ]; then
                    cp ./secring.gpg ../jedis-compat-shared/secring.gpg
                  fi
              env:
                  SECRING_GPG: ${{ secrets.SECRING_GPG }}

            - name: Build uber JAR (no Rust compilation needed)
              working-directory: java
              shell: bash
              env:
                  GLIDE_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
                  UBER_JAR_BUILD: "true"
              run: |
                  # Build uber JAR and publish to Maven local in one step
                  # UBER_JAR_BUILD env var signals build.gradle to use copyAllNativeLibs
                  ./gradlew --build-cache :client:publishToMavenLocal \
                  -x buildRust -x copyNativeLib \
                  -Psigning.secretKeyRingFile=secring.gpg \
                  -Psigning.password="${{ secrets.GPG_PASSWORD }}" \
                  -Psigning.keyId=${{ secrets.GPG_KEY_ID }}

            - name: Bundle uber JAR
              working-directory: java
              shell: bash
              run: |
                  src_folder=~/.m2/repository/io/valkey/valkey-glide/${{ env.RELEASE_VERSION }}
                  cd $src_folder
                  jar -cvf bundle.jar *
                  ls -ltr
                  cd -
                  cp $src_folder/bundle.jar bundle-uber-jar.jar

            - name: Build jedis-compat-shared (no classifier, no natives)
              working-directory: java
              shell: bash
              env:
                  GLIDE_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
                  JEDIS_NO_CLASSIFIER_BUILD: "true"
              run: |
                  ./gradlew --build-cache :jedis-compat-shared:publishToMavenLocal \
                  -x buildRust \
                  -Psigning.secretKeyRingFile=secring.gpg \
                  -Psigning.password="${{ secrets.GPG_PASSWORD }}" \
                  -Psigning.keyId=${{ secrets.GPG_KEY_ID }}

            - name: Build jedis-compatibility (no classifier, no natives)
              working-directory: java
              shell: bash
              env:
                  GLIDE_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
                  JEDIS_NO_CLASSIFIER_BUILD: "true"
              run: |
                  ./gradlew --build-cache :jedis-compatibility:publishToMavenLocal \
                  -x buildRust \
                  -Psigning.secretKeyRingFile=secring.gpg \
                  -Psigning.password="${{ secrets.GPG_PASSWORD }}" \
                  -Psigning.keyId=${{ secrets.GPG_KEY_ID }}

            - name: Bundle jedis-compatibility no-classifier JAR
              working-directory: java
              shell: bash
              run: |
                  src_folder=~/.m2/repository/io/valkey/valkey-glide-jedis-compatibility/${{ env.RELEASE_VERSION }}
                  cd $src_folder
                  jar -cvf jedis-bundle.jar *
                  ls -ltr
                  cd -
                  cp $src_folder/jedis-bundle.jar jedis-bundle-no-classifier.jar

            - name: Build jedis-4-compatibility (no classifier, no natives)
              working-directory: java
              shell: bash
              env:
                  GLIDE_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
                  JEDIS_NO_CLASSIFIER_BUILD: "true"
              run: |
                  ./gradlew --build-cache :jedis-4-compatibility:publishToMavenLocal \
                  -x buildRust \
                  -Psigning.secretKeyRingFile=secring.gpg \
                  -Psigning.password="${{ secrets.GPG_PASSWORD }}" \
                  -Psigning.keyId=${{ secrets.GPG_KEY_ID }}

            - name: Bundle jedis-4-compatibility no-classifier JAR
              working-directory: java
              shell: bash
              run: |
                  jedis4_src_folder=~/.m2/repository/io/valkey/valkey-glide-jedis-4-compatibility/${{ env.RELEASE_VERSION }}
                  if [ ! -d "$jedis4_src_folder" ]; then
                    echo "Expected Maven local output missing: $jedis4_src_folder" >&2
                    exit 1
                  fi
                  cd $jedis4_src_folder
                  jar -cvf jedis4-bundle.jar *
                  ls -ltr
                  cd -
                  cp $jedis4_src_folder/jedis4-bundle.jar jedis4-bundle-no-classifier.jar

            - name: Smoke test uber JAR
              working-directory: java
              shell: bash
              run: |
                  # Extract in a temp dir so the working directory is not polluted; clean up on exit.
                  bundle="$PWD/bundle-uber-jar.jar"
                  tmp_dir=$(mktemp -d)
                  trap 'rm -rf "$tmp_dir"' EXIT
                  cd "$tmp_dir"
                  jar xf "$bundle"
                  INNER_JAR=$(find . -maxdepth 1 -name 'valkey-glide-*.jar' ! -name '*sources*' ! -name '*javadoc*' | head -1)
                  mkdir inner && (cd inner && jar xf "../$INNER_JAR")
                  find inner/natives -name "*.so" -o -name "*.dylib" -o -name "*.dll" | grep -q .

            - name: Upload uber JAR artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: java-uber-jar
                  path: java/bundle-uber-jar.jar

            - name: Upload jedis no-classifier artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: jedis-no-classifier
                  path: java/jedis-bundle-no-classifier.jar

            - name: Upload jedis-4 no-classifier artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: jedis-4-no-classifier
                  path: java/jedis4-bundle-no-classifier.jar

    publish-to-maven-central-deployment:
        if: ${{ inputs.maven_publish == true || github.event_name == 'push' }}
        needs:
            [set-release-version, create-binaries-to-publish, create-uber-jar]
        runs-on: ubuntu-latest
        outputs:
            DEPLOYMENT_ID: ${{ steps.maven-deployment.outputs.DEPLOYMENT_ID }}
        env:
            RELEASE_VERSION: ${{ needs.set-release-version.outputs.RELEASE_VERSION }}
        steps:
            - name: Download published artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

            - name: Move all required files to one directory
              shell: bash
              run: |
                  mkdir maven-files
                  cd maven-files
                  for file in $(find ../. -name "*.jar"); do jar xf "$file" ; done

            - name: Generate sha1 and md5 files for all Maven files
              shell: bash
              run: |
                  cd maven-files
                  for i in *.jar *.pom *.module; do md5sum $i | cut -d ' ' -f 1 > $i.md5; done
                  for i in *.jar *.pom *.module; do sha1sum $i | cut -d ' ' -f 1 > $i.sha1; done

            - name: Move files to the correct directory tree
              shell: bash
              run: |
                  mkdir -p build/io/valkey/valkey-glide/${{ env.RELEASE_VERSION }}
                  mkdir -p build/io/valkey/valkey-glide-jedis-compat-shared/${{ env.RELEASE_VERSION }}
                  mkdir -p build/io/valkey/valkey-glide-jedis-compatibility/${{ env.RELEASE_VERSION }}
                  mkdir -p build/io/valkey/valkey-glide-jedis-4-compatibility/${{ env.RELEASE_VERSION }}

                  # Move jedis-compat-shared first (dependency of jedis compatibility artifacts)
                  if ls maven-files/valkey-glide-jedis-compat-shared* 1>/dev/null 2>&1; then
                    cp -a maven-files/valkey-glide-jedis-compat-shared* build/io/valkey/valkey-glide-jedis-compat-shared/${{ env.RELEASE_VERSION }}
                  fi

                  # Move jedis-compatibility files first
                  cp -a maven-files/valkey-glide-jedis-compatibility* build/io/valkey/valkey-glide-jedis-compatibility/${{ env.RELEASE_VERSION }}

                  # Move jedis-4-compatibility files when present
                  if ls maven-files/valkey-glide-jedis-4-compatibility* 1>/dev/null 2>&1; then
                    cp -a maven-files/valkey-glide-jedis-4-compatibility* build/io/valkey/valkey-glide-jedis-4-compatibility/${{ env.RELEASE_VERSION }}
                  fi

                  # Move client files (exclude jedis compatibility artifacts)
                  find maven-files -name "valkey-glide-*" ! -name "*jedis-compat-shared*" ! -name "*jedis-compatibility*" ! -name "*jedis-4-compatibility*" -exec cp {} build/io/valkey/valkey-glide/${{ env.RELEASE_VERSION }}/ \;

                  rm -rf build/io/valkey/valkey-glide/${{ env.RELEASE_VERSION }}/META-INF
                  rm -rf build/io/valkey/valkey-glide-jedis-compat-shared/${{ env.RELEASE_VERSION }}/META-INF
                  rm -rf build/io/valkey/valkey-glide-jedis-compatibility/${{ env.RELEASE_VERSION }}/META-INF
                  rm -rf build/io/valkey/valkey-glide-jedis-4-compatibility/${{ env.RELEASE_VERSION }}/META-INF
                  cd build
                  zip -r ../build io

            - name: Upload bundle to CI artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: valkey-${{ env.RELEASE_VERSION }}
                  path: |
                      build

            - name: Publish to Maven Central
              id: maven-deployment
              shell: bash
              run: |
                  export DEPLOYMENT_ID=$(curl --fail --request POST \
                  -u "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" \
                  --form bundle=@build.zip \
                  https://central.sonatype.com/api/v1/publisher/upload | tail -n 1)
                  echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
                  echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
                  echo Uploaded to Maven deployment with deployment ID $DEPLOYMENT_ID. Will be released if smoke tests pass and approved for release.

            - name: Check status of deployment
              shell: bash
              run: |
                  for ((retries = 0; retries < 20; retries++)); do
                      sleep 5
                      export DEPLOYMENT_STATUS=$(curl --request POST \
                      -u "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" \
                      "https://central.sonatype.com/api/v1/publisher/status?id=${{ env.DEPLOYMENT_ID }}" \
                      | jq -r '.deploymentState')

                      if [[ $DEPLOYMENT_STATUS == "VALIDATED" ]]; then exit 0; fi
                  done

                  curl --request POST \
                  -u "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" \
                  "https://central.sonatype.com/api/v1/publisher/status?id=${{ env.DEPLOYMENT_ID }}" \
                  | jq
                  echo "Deployment ${{ env.DEPLOYMENT_ID }} was unsuccessful with status $DEPLOYMENT_STATUS"
                  exit 1

    test-deployment-on-all-architectures:
        needs:
            [
                set-release-version,
                load-platform-matrix,
                publish-to-maven-central-deployment,
            ]
        env:
            JAVA_VERSION: "11"
            RELEASE_VERSION: ${{ needs.set-release-version.outputs.RELEASE_VERSION }}
        strategy:
            # Run all jobs
            fail-fast: false
            matrix:
                host: ${{ fromJson(needs.load-platform-matrix.outputs.PLATFORM_MATRIX) }}
                exclude:
                    - host:
                          TARGET: aarch64-unknown-linux-musl
                    - host:
                          OS: windows
        runs-on: ${{ matrix.host.test-runner || matrix.host.runner }}
        container:
            image: ${{ matrix.host.IMAGE || ''}}
            options: ${{ join(' -q ', matrix.host.CONTAINER_OPTIONS) }} # adding `-q` to bypass empty options
        steps:
            - name: Setup self-hosted runner access
              if: ${{matrix.host.TARGET == 'aarch64-unknown-linux-gnu' }}
              run: sudo chown -R $USER:$USER /home/ubuntu/action-runner-ilia/_work/valkey-glide

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up JDK
              uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
              with:
                  distribution: "temurin"
                  java-version: ${{ env.JAVA_VERSION }}

            - name: Install git and Java for musl
              if: ${{ contains(matrix.host.TARGET, 'musl') }}
              run: |
                  # Set environment variable to indicate container environment for Gradle
                  echo "GLIDE_CONTAINER_BUILD=true" >> $GITHUB_ENV
                  apk add openjdk11 git bash curl
                  export JAVA_HOME=/usr/lib/jvm/java-11-openjdk
                  # Create gradle user home and disable auto-download
                  mkdir -p ~/.gradle
                  echo "org.gradle.java.installations.auto-download=false" >> ~/.gradle/gradle.properties
                  echo JAVA_HOME=/usr/lib/jvm/java-11-openjdk >> $GITHUB_ENV
              env:
                  JAVA_HOME: ${{ env.JAVA_HOME }}

            - name: Install shared software dependencies
              uses: ./.github/actions/install-shared-dependencies
              with:
                  os: ${{ matrix.host.OS }}
                  engine-version: "7.2"
                  target: ${{ matrix.host.TARGET }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install protoc (protobuf)
              uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
              with:
                  version: "29.1"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Cache Gradle dependencies
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-test-cd-${{ hashFiles('java/**/*.gradle*', 'java/**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-test-cd-
                      ${{ runner.os }}-gradle-cd-
                      ${{ runner.os }}-gradle-

            - name: Wait for deployment artifacts to be available
              shell: bash
              run: |
                  AUTH_HEADER="Bearer $(echo -n "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" | base64)"
                  ARTIFACT_URL="https://central.sonatype.com/api/v1/publisher/deployments/download/io/valkey/valkey-glide/${{ env.RELEASE_VERSION }}/valkey-glide-${{ env.RELEASE_VERSION }}.pom"
                  for ((retries = 0; retries < 6; retries++)); do
                      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: $AUTH_HEADER" "$ARTIFACT_URL")
                      if [ "$HTTP_STATUS" = "200" ]; then
                          echo "Artifact available"
                          exit 0
                      fi
                      echo "Attempt $((retries + 1))/6: HTTP $HTTP_STATUS, waiting 5s..."
                      sleep 5
                  done
                  echo "::warning::Artifact not available after 30s, proceeding anyway (deployment already validated)"

            - name: Start standalone Valkey server
              working-directory: utils
              id: port
              shell: bash
              run: |
                  PORT=$(python3 ./cluster_manager.py start -r 0 2>&1 | grep CLUSTER_NODES | cut -d = -f 2 | cut -d , -f 1 | cut -d : -f 2)
                  if [ -z "$PORT" ]; then
                      echo "Failed to extract PORT from cluster_manager.py output"
                      exit 1
                  fi
                  echo "PORT=$PORT" >> $GITHUB_OUTPUT

            - name: Test deployment
              working-directory: java
              shell: bash
              env:
                  PORT: ${{ steps.port.outputs.PORT }}
                  GRADLE_OPTS: "-Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000"
              run: |
                  export ORG_GRADLE_PROJECT_centralManualTestingAuthHeaderName="Authorization"
                  export ORG_GRADLE_PROJECT_centralManualTestingAuthHeaderValue="Bearer $(echo -n "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" | base64)"
                  export GLIDE_RELEASE_VERSION=${{ env.RELEASE_VERSION }}
                  ./gradlew --build-cache :benchmarks:run --args="--minimal --clients glide --port ${{ env.PORT }}"

    publish-release-to-maven:
        if: ${{ inputs.maven_publish == true || github.event_name == 'push' }}
        needs:
            [
                publish-to-maven-central-deployment,
                test-deployment-on-all-architectures,
            ]
        runs-on: ubuntu-latest
        environment: AWS_ACTIONS
        env:
            DEPLOYMENT_ID: ${{ needs.publish-to-maven-central-deployment.outputs.DEPLOYMENT_ID }}
        steps:
            - name: Publish to Maven
              run: |
                  curl --fail --request POST \
                  -u "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" \
                  "https://central.sonatype.com/api/v1/publisher/deployment/${{ env.DEPLOYMENT_ID }}"

    drop-deployment-if-validation-fails:
        if: ${{ failure() }}
        needs:
            [
                publish-to-maven-central-deployment,
                test-deployment-on-all-architectures,
            ]
        runs-on: ubuntu-latest
        env:
            DEPLOYMENT_ID: ${{ needs.publish-to-maven-central-deployment.outputs.DEPLOYMENT_ID }}
        steps:
            - name: Drop deployment if validation fails
              run: |
                  curl --request DELETE \
                  -u "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" \
                  "https://central.sonatype.com/api/v1/publisher/deployment/${{ env.DEPLOYMENT_ID }}"
